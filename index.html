<!DOCTYPE html>
<html>
<head>
<title>DG Tech Manager - Login</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#1e293b;padding:30px;border-radius:10px}
input{display:block;margin:10px 0;padding:10px;width:100%}
button{padding:10px;width:100%;background:#38bdf8;border:none}
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<script>
function login(){
 if(user.value=='admin' && pass.value=='1234'){
  localStorage.setItem('logado','sim');
  location.href='dashboard.html';
 }else{
  alert('Login inválido');
 }
}
</script>
</body>
</html>
