<!DOCTYPE html>
<html>
<head><title>Estoque</title></head>
<body>
<h2>Estoque</h2>
<input id="p" placeholder="Produto">
<input id="q" placeholder="Qtd">
<input id="c" placeholder="Custo">
<button onclick="add()">Salvar</button>
<ul id="l"></ul>

<script>
let e = JSON.parse(localStorage.getItem('est')||'[]');
function add(){
 e.push({p:p.value,q:q.value,c:c.value});
 localStorage.setItem('est',JSON.stringify(e));
 load();
}
function load(){
 l.innerHTML='';
 e.forEach(i=>{
  l.innerHTML+=`<li>${i.p} (${i.q}) R$ ${i.c}</li>`;
 });
}
load();
</script>
</body>
</html>
